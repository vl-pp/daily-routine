<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="robots" content="noindex, nofollow">
  <title>Daily Routine</title>
  <script>
    (function () {
      var saved = localStorage.getItem('theme');
      var theme = (saved === 'light' || saved === 'dark')
        ? saved
        : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-grad-1: #fefdf6;
      --bg-grad-2: #fdfbf0;
      --bg-page: #fdfcf4;
      --card-bg: rgba(255, 255, 251, 0.5);
      --hour-bg: rgba(255, 255, 251, 0.75);
      --border: rgba(255, 255, 255, 0.55);
      --grid-line: rgba(60, 50, 20, 0.08);
      --shadow-soft: 0 1px 2px rgba(60, 50, 20, 0.04), 0 8px 24px rgba(60, 50, 20, 0.06);
      --shadow-modal: 0 20px 60px rgba(60, 50, 20, 0.2), 0 2px 6px rgba(60, 50, 20, 0.1);
      --text-main: #18181b;
      --text-muted: #6b7280;
      --accent-blue: #2563eb;

      --workout-bg: #fffdef;
      --workout-bd: #f59e0b;
      --workout-fg: #92400e;
      --meal-bg: #d1fae5;
      --meal-bd: #10b981;
      --meal-fg: #065f46;
      --fast-bg: #fee2e2;
      --fast-bd: #ef4444;
      --fast-fg: #991b1b;
      --supp-bg: #ede9fe;
      --supp-bd: #8b5cf6;
      --supp-fg: #5b21b6;
      --dessert-bg: #fce7f3;
      --dessert-bd: #ec4899;
      --dessert-fg: #9d174d;
      --neutral-bg: #f3f4f6;
      --neutral-bd: #9ca3af;
      --neutral-fg: #4b5563;

      --toggle-active-bg: #3f3f46;
      --toggle-active-fg: #ffffff;
    }

    :root[data-theme="dark"] {
      --bg-grad-1: #0d1729;
      --bg-grad-2: #18243f;
      --bg-page: #0f1a2e;
      --card-bg: rgba(255, 255, 255, 0.06);
      --hour-bg: rgba(15, 26, 46, 0.7);
      --border: rgba(255, 255, 255, 0.1);
      --grid-line: rgba(255, 255, 255, 0.07);
      --shadow-soft: 0 1px 2px rgba(0, 0, 0, 0.3), 0 8px 24px rgba(0, 0, 0, 0.35);
      --shadow-modal: 0 20px 60px rgba(0, 0, 0, 0.6), 0 2px 6px rgba(0, 0, 0, 0.4);
      --text-main: #fafafa;
      --text-muted: #9ca3af;
      --accent-blue: #3b82f6;

      --workout-bg: #3a2e10;
      --workout-bd: #d97706;
      --workout-fg: #fcd34d;
      --meal-bg: #0f2e22;
      --meal-bd: #059669;
      --meal-fg: #6ee7b7;
      --fast-bg: #3a1414;
      --fast-bd: #dc2626;
      --fast-fg: #fca5a5;
      --supp-bg: #2a1f4a;
      --supp-bd: #7c3aed;
      --supp-fg: #c4b5fd;
      --dessert-bg: #3a1428;
      --dessert-bd: #db2777;
      --dessert-fg: #f9a8d4;
      --neutral-bg: #27272c;
      --neutral-bd: #6b7280;
      --neutral-fg: #d1d5db;

      --toggle-active-bg: #e4e4e7;
      --toggle-active-fg: #18181b;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-weight: 300;
    }

    body {
      background: linear-gradient(155deg, var(--bg-grad-1), var(--bg-grad-2)) fixed;
      background-color: var(--bg-page);
      color: var(--text-main);
      padding: 8px 10px 12px;
      font-weight: 300;
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 14px 0 10px;
      margin-bottom: 6px;
    }

    header h1 {
      font-size: 1.05rem;
      font-weight: 400;
      letter-spacing: -0.3px;
    }

    .toggle {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      margin: 6px 0 18px;
      background-color: var(--card-bg);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      box-shadow: var(--shadow-soft);
    }

    .toggle-option {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 12px 4px;
      font-size: 0.78rem;
      font-weight: 400;
      color: var(--text-muted);
      transition: background-color 0.15s ease, color 0.15s ease;
    }

    .toggle-option.active {
      background-color: var(--toggle-active-bg);
      color: var(--toggle-active-fg);
    }

    .theme-toggle {
      position: fixed;
      top: 10px;
      right: 12px;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--card-bg);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid var(--border);
      border-radius: 50%;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0;
      z-index: 50;
      -webkit-tap-highlight-color: transparent;
      box-shadow: var(--shadow-soft);
      transition: color 0.15s ease, background-color 0.15s ease;
    }

    .theme-toggle:hover {
      color: var(--text-main);
    }

    .theme-toggle svg {
      width: 16px;
      height: 16px;
    }

    .theme-toggle .icon-sun {
      display: none;
    }

    .theme-toggle .icon-moon {
      display: block;
    }

    :root[data-theme="dark"] .theme-toggle .icon-sun {
      display: block;
    }

    :root[data-theme="dark"] .theme-toggle .icon-moon {
      display: none;
    }

    .toggle-emoji {
      font-size: 1rem;
      line-height: 1;
    }

    /* Calendar timeline */
    .calendar {
      position: relative;
      background-color: var(--card-bg);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 8px 8px 8px 8px;
      box-shadow: var(--shadow-soft);
    }

    .timeline {
      position: relative;
      /* height set dynamically */
    }

    .hour-row {
      position: absolute;
      left: 50px;
      right: 0;
      border-top: 1px solid var(--grid-line);
    }

    .hour-label {
      position: absolute;
      left: 0;
      width: 44px;
      text-align: right;
      font-size: 0.65rem;
      font-weight: 400;
      color: var(--text-muted);
      padding-right: 4px;
      transform: translateY(-50%);
      letter-spacing: 0.2px;
    }

    .event-area {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50px;
      right: 0;
      /* hour labels sit in the 50px left rail */
    }

    .event {
      position: absolute;
      background-color: var(--neutral-bg);
      border-left: 3px solid var(--neutral-bd);
      color: var(--neutral-fg);
      border-radius: 4px;
      padding: 3px 6px;
      overflow: hidden;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 1px 1px rgba(0, 0, 0, 0.03);
    }

    .event.type-workout {
      background-color: var(--workout-bg);
      border-left-color: var(--workout-bd);
      color: var(--workout-fg);
    }

    .event.type-meal {
      background-color: var(--meal-bg);
      border-left-color: var(--meal-bd);
      color: var(--meal-fg);
    }

    .event.type-fast {
      background-color: var(--fast-bg);
      border-left-color: var(--fast-bd);
      color: var(--fast-fg);
    }

    .event.type-supp {
      background-color: var(--supp-bg);
      border-left-color: var(--supp-bd);
      color: var(--supp-fg);
    }

    .event.type-dessert {
      background-color: var(--dessert-bg);
      border-left-color: var(--dessert-bd);
      color: var(--dessert-fg);
    }

    .event-title {
      font-size: 0.72rem;
      font-weight: 500;
      line-height: 1.15;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .event-title.tag-label {
      text-transform: uppercase;
      letter-spacing: 0.4px;
      font-size: 0.65rem;
    }

    .event-time {
      font-size: 0.6rem;
      font-weight: 500;
      opacity: 0.8;
      line-height: 1.1;
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Legend */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 10px;
      margin-top: 10px;
      font-size: 0.65rem;
      color: var(--text-muted);
      justify-content: center;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .legend-swatch {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      border-left: 3px solid;
    }

    /* Modal */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.08);
      -webkit-backdrop-filter: blur(24px) saturate(150%);
      backdrop-filter: blur(24px) saturate(150%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 100;
    }

    .modal-backdrop.hidden {
      display: none;
    }

    .modal {
      background: var(--card-bg);
      -webkit-backdrop-filter: blur(30px) saturate(180%);
      backdrop-filter: blur(30px) saturate(180%);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 14px 12px;
      width: 100%;
      max-width: 360px;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: var(--shadow-modal);
    }

    .modal-time {
      font-size: 0.7rem;
      font-weight: 400;
      color: var(--text-muted);
      letter-spacing: 0.2px;
    }

    .modal-title {
      font-size: 1rem;
      font-weight: 500;
      color: var(--text-main);
      margin-top: 2px;
      margin-bottom: 8px;
    }

    .modal-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 8px;
    }

    .tag {
      font-size: 0.6rem;
      font-weight: 500;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 3px;
      letter-spacing: 0.3px;
    }

    .tag.fast {
      background-color: var(--fast-bg);
      color: var(--fast-fg);
    }

    .tag.supp {
      background-color: var(--supp-bg);
      color: var(--supp-fg);
    }

    .tag.workout {
      background-color: var(--workout-bg);
      color: var(--workout-fg);
    }

    .tag.meal {
      background-color: var(--meal-bg);
      color: var(--meal-fg);
    }

    .tag.dessert {
      background-color: var(--dessert-bg);
      color: var(--dessert-fg);
    }

    .modal-details {
      font-size: 0.85rem;
      color: var(--text-main);
      line-height: 1.45;
      margin-bottom: 12px;
    }

    .modal-details p {
      margin: 0 0 8px;
    }

    .modal-details p:last-child {
      margin-bottom: 0;
    }

    .modal-details ul {
      padding-left: 18px;
      margin: 0 0 8px;
    }

    .modal-details ul ul {
      margin: 4px 0 4px;
    }

    .modal-details li {
      margin-bottom: 3px;
    }

    .modal-details strong {
      font-weight: 500;
    }

    .modal-close {
      width: 100%;
      background: var(--accent-blue);
      color: #fff;
      border: none;
      padding: 8px;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <button class="theme-toggle" id="theme-toggle" aria-label="Toggle light/dark mode" title="Toggle light/dark mode">
    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
      stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
    </svg>
    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
      stroke-linejoin="round">
      <circle cx="12" cy="12" r="4" />
      <path
        d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" />
    </svg>
  </button>

  <header>
    <h1>Daily Routine</h1>
  </header>

  <div class="toggle" id="view-toggle">
    <div class="toggle-option" data-value="rest"><span class="toggle-emoji">😴</span>Rest</div>
    <div class="toggle-option active" data-value="wk-workout"><span class="toggle-emoji">🚴</span>Weekday</div>
    <div class="toggle-option" data-value="wkend-workout"><span class="toggle-emoji">🚴</span>Weekend</div>
  </div>

  <div class="calendar">
    <div id="timeline" class="timeline"></div>
    <div class="legend">
      <span class="legend-item"><span class="legend-swatch"
          style="background:var(--fast-bg);border-color:var(--fast-bd)"></span>Fast</span>
      <span class="legend-item"><span class="legend-swatch"
          style="background:var(--meal-bg);border-color:var(--meal-bd)"></span>Meal</span>
      <span class="legend-item"><span class="legend-swatch"
          style="background:var(--workout-bg);border-color:var(--workout-bd)"></span>Workout</span>
      <span class="legend-item"><span class="legend-swatch"
          style="background:var(--supp-bg);border-color:var(--supp-bd)"></span>Supp</span>
      <span class="legend-item"><span class="legend-swatch"
          style="background:var(--dessert-bg);border-color:var(--dessert-bd)"></span>Dessert</span>
    </div>
  </div>

  <div id="modal" class="modal-backdrop hidden">
    <div class="modal">
      <div class="modal-time"></div>
      <div class="modal-title"></div>
      <div class="modal-tags"></div>
      <div class="modal-details"></div>
      <button class="modal-close">Close</button>
    </div>
  </div>

  <script>
    const schedules = {
      'wk-workout': [
        { time: '7:00 AM - 12:00 PM', title: 'Fasted Focus Window', tags: ['fast'], details: `

            <li>1/8 to 1/4 tsp fine salt (replaces lost sodium)</li>
            <li>1–2 tbsp real lemon juice (adds potassium, cuts sweetness)</li>
            <li>Cold water and ice</li>
          </ul>
          <p><strong>Intensity variants:</strong></p>
          <ul>
            <li><strong>Climbing / over 60 min:</strong> Add 2 tbsp white table sugar (~24–28g carbs). Working leg muscles vacuum it up to conquer steep grades without triggering an insulin spike.</li>
            <li><strong>Flat Zone 2 / under 60 min:</strong> Zero sugar. Water + salt + lemon only — preserves the morning fast and maximizes fat-burning.</li>
          </ul>
        ` },
        {
          time: '9:30 AM - 10:00 AM', title: 'Post-Ride Recovery Bridge', tags: ['meal'], details: `
          <p><strong>When:</strong> Eat within 30 min of stepping off the bike. Restocks muscle glycogen and halts breakdown while keeping lunch on time at 12:00 PM.</p>
          <p><strong>Protein + fruit pairings (choose one):</strong></p>
          <ul>
            <li><strong>Yogurt:</strong> Small bowl of plain unsweetened Greek yogurt with a handful of fresh berries.</li>
            <li><strong>Whole food:</strong> 1 hard-boiled egg + half a fresh apple or pear.</li>
            <li><strong>Nut & dried fruit:</strong> Handful of plain cashews + one of:
              <ul>
                <li>2–3 dried apricots or prunes (low GI, excellent fiber)</li>
                <li>1–1.5 tbsp raisins (quick potassium + glycogen recharge)</li>
                <li>1 large or 2 small dried figs (seed fiber slows absorption)</li>
                <li>1 small strip dried mango (limit to 1 — higher natural sugar)</li>
              </ul>
            </li>
          </ul>
        ` },
        { time: '12:00 PM', title: 'Post-Ride Recovery Lunch', tags: ['meal', 'supp', 'dessert'], details: `
          <p><strong>Meal:</strong> Substantial loading meal. E.g., eggs, turkey bacon, whole grain toast.</p>
          <p><strong>Take:</strong></p>
          <ul>
            <li>Kirkland Multi</li>
            <li>Kirkland Calcium/Zinc</li>
            <li>Triple Action Joint</li>
          </ul>
          <p><strong>Window:</strong> Excellent slot for a dessert reward.</p>
          <p><strong>Portioning &amp; carb control:</strong></p>
          <ul>
            <li>No need to supersize — eat a normal meal, at most 20–30% larger if genuinely hungry.</li>
            <li>Carb-heavy lunches spike blood sugar after the 16h fast, driving 3 PM brain fog and cravings.</li>
            <li>Buffer carbs: fiber (greens) 10 min before, plus protein/fat (nuts) with the meal.</li>
            <li>Walk 10 min within 15–20 min of finishing — clears glucose without an insulin spike.</li>
            <li>Focus dip before lunch? Eat a tiny zero-glycemic "bridge snack" at 11–11:30 AM — a handful of plain nuts or one hard-boiled egg — to calm hunger without an insulin spike and avoid arriving starved enough to grab fast carbs.</li>
          </ul>
        ` },
        { time: '6:00 PM', title: 'Dinner', tags: ['meal'], details: `
          <p><strong>Meal:</strong> Balanced whole foods.</p>
          <p><strong>Focus:</strong> Antioxidants to manage post-ride joint inflammation.</p>
        ` },
        { time: '8:00 PM', title: 'Fast Begins', tags: ['fast'], details: `
          <p><strong>Action:</strong> Kitchen closed.</p>
          <p><strong>Why:</strong> Early fast setup ensures high morning clarity for Sunday.</p>
        ` },
        { time: '9:00 PM', title: 'Sleep Preparation', tags: ['supp'], details: `
          <p><strong>Take:</strong></p>
          <ul>
            <li>Nature&rsquo;s Bounty Magnesium Glycinate</li>
          </ul>
          <p><strong>Why:</strong> Assists muscle tissue recovery and prevents cramping.</p>
        ` }
      ],
    };

    const TIMELINE_START = 7;   // 7am
    const TIMELINE_END = 22.5;  // 10:30pm so 10pm events render fully
    const HOUR_HEIGHT = 38;     // px per hour
    const DEFAULT_DURATION = 0.75; // 45 min for single-time events
    const TYPE_PRIORITY = ['workout', 'meal', 'fast', 'supp', 'dessert'];

    let currentView = 'wk-workout';

    function parseSingleTime(str) {
      const m = str.trim().match(/(\d+)(?::(\d+))?\s*(AM|PM)/i);
      let h = parseInt(m[1], 10);
      const min = m[2] ? parseInt(m[2], 10) : 0;
      const period = m[3].toUpperCase();
      if (period === 'PM' && h !== 12) h += 12;
      if (period === 'AM' && h === 12) h = 0;
      return h + min / 60;
    }

    function parseTimeRange(str) {
      const parts = str.split(/\s*-\s*/);
      const start = parseSingleTime(parts[0]);
      const end = parts[1] ? parseSingleTime(parts[1]) : start + DEFAULT_DURATION;
      return { start, end };
    }

    function primaryType(tags) {
      for (const t of TYPE_PRIORITY) if (tags.includes(t)) return t;
      return null;
    }

    function formatHourLabel(h) {
      const hr = h % 24;
      const period = hr >= 12 ? 'PM' : 'AM';
      const display = hr % 12 === 0 ? 12 : hr % 12;
      return `${display} ${period}`;
    }

    function assignColumns(events) {
      // Greedy column packing within overlap groups
      events.sort((a, b) => a.start - b.start);
      const placements = events.map(() => ({ col: 0, totalCols: 1 }));
      let i = 0;
      while (i < events.length) {
        let groupEnd = events[i].end;
        let j = i;
        while (j + 1 < events.length && events[j + 1].start < groupEnd) {
          j++;
          groupEnd = Math.max(groupEnd, events[j].end);
        }
        const groupEvents = events.slice(i, j + 1);
        const colsLastEnd = [];
        for (let k = 0; k < groupEvents.length; k++) {
          const ev = groupEvents[k];
          let assigned = -1;
          for (let c = 0; c < colsLastEnd.length; c++) {
            if (colsLastEnd[c] <= ev.start) { assigned = c; break; }
          }
          if (assigned === -1) {
            assigned = colsLastEnd.length;
            colsLastEnd.push(ev.end);
          } else {
            colsLastEnd[assigned] = ev.end;
          }
          placements[i + k].col = assigned;
        }
        const total = colsLastEnd.length;
        for (let k = 0; k < groupEvents.length; k++) placements[i + k].totalCols = total;
        i = j + 1;
      }
      return placements;
    }

    function render() {
      const tabId = currentView;
      const timeline = document.getElementById('timeline');
      timeline.innerHTML = '';

      const totalHours = TIMELINE_END - TIMELINE_START;
      const height = totalHours * HOUR_HEIGHT;
      timeline.style.height = height + 'px';

      // Hour grid lines + labels (show whole hours only)
      for (let h = TIMELINE_START; h <= Math.floor(TIMELINE_END); h++) {
        const top = (h - TIMELINE_START) * HOUR_HEIGHT;
        const line = document.createElement('div');
        line.className = 'hour-row';
        line.style.top = top + 'px';
        timeline.appendChild(line);

        const label = document.createElement('div');
        label.className = 'hour-label';
        label.style.top = top + 'px';
        label.textContent = formatHourLabel(h);
        timeline.appendChild(label);
      }

      // Event layer
      const area = document.createElement('div');
      area.className = 'event-area';
      timeline.appendChild(area);

      // Parse events, extend single-time fasts to end of day, then explode multi-tag
      // events into one sub-event per tag so they render side-by-side.
      const raw = schedules[tabId];
      const expanded = [];
      raw.forEach(e => {
        const { start, end: rawEnd } = parseTimeRange(e.time);
        const hasRange = /-/.test(e.time);
        const isOngoingFast = !hasRange && e.tags.includes('fast');
        const end = isOngoingFast ? TIMELINE_END : rawEnd;
        const tagList = e.tags.length ? e.tags : [null];
        tagList.forEach(tag => {
          expanded.push({
            parent: e,
            tag,
            start: Math.max(start, TIMELINE_START),
            end: Math.min(end, TIMELINE_END),
            isMulti: e.tags.length > 1
          });
        });
      });

      const placements = assignColumns(expanded);

      expanded.forEach((ev, idx) => {
        const top = (ev.start - TIMELINE_START) * HOUR_HEIGHT;
        const blockHeight = Math.max((ev.end - ev.start) * HOUR_HEIGHT - 2, 22);
        const { col, totalCols } = placements[idx];
        const widthPct = 100 / totalCols;
        const leftPct = col * widthPct;

        const block = document.createElement('div');
        block.className = 'event' + (ev.tag ? ` type-${ev.tag}` : '');
        block.style.top = top + 'px';
        block.style.height = blockHeight + 'px';
        block.style.left = `calc(${leftPct}% + 2px)`;
        block.style.width = `calc(${widthPct}% - 4px)`;

        const titleText = ev.isMulti ? ev.tag : ev.parent.title;
        const titleClass = ev.isMulti ? 'event-title tag-label' : 'event-title';
        const showTime = !ev.isMulti && blockHeight >= 28;
        block.innerHTML = `
          <div class="${titleClass}">${titleText}</div>
          ${showTime ? `<div class="event-time">${ev.parent.time}</div>` : ''}
        `;
        block.addEventListener('click', () => openModal(ev.parent));
        area.appendChild(block);
      });
    }

    function openModal(ev) {
      const modal = document.getElementById('modal');
      modal.querySelector('.modal-time').textContent = ev.time;
      modal.querySelector('.modal-title').textContent = ev.title;
      const tagsEl = modal.querySelector('.modal-tags');
      tagsEl.innerHTML = ev.tags.map(t => `<span class="tag ${t}">${t}</span>`).join('');
      modal.querySelector('.modal-details').innerHTML = ev.details;
      modal.classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
    }

    document.getElementById('modal').addEventListener('click', (e) => {
      if (e.target.id === 'modal') closeModal();
    });
    document.querySelector('.modal-close').addEventListener('click', closeModal);

    // Map between schedule keys and URL hash slugs (clean, shareable URLs)
    const VIEW_TO_HASH = { 'rest': 'rest', 'wk-workout': 'weekday', 'wkend-workout': 'weekend' };
    const HASH_TO_VIEW = { 'rest': 'rest', 'weekday': 'wk-workout', 'weekend': 'wkend-workout' };

    function applyView(view, opts) {
      if (!schedules[view]) return;
      currentView = view;
      document.querySelectorAll('#view-toggle .toggle-option').forEach(o => {
        o.classList.toggle('active', o.dataset.value === view);
      });
      const targetHash = '#' + VIEW_TO_HASH[view];
      if (!opts || !opts.skipHash) {
        if (location.hash !== targetHash) {
          history.replaceState(null, '', targetHash);
        }
      }
      render();
    }

    document.querySelectorAll('.toggle').forEach(toggle => {
      toggle.addEventListener('click', (e) => {
        const clickedOption = e.target.closest('.toggle-option');
        if (!clickedOption || clickedOption.classList.contains('active')) return;
        applyView(clickedOption.dataset.value);
      });
    });

    window.addEventListener('hashchange', () => {
      const view = HASH_TO_VIEW[location.hash.slice(1)];
      if (view) applyView(view, { skipHash: true });
    });

    // Initial view: hash if valid, else the default already set on currentView
    const initialView = HASH_TO_VIEW[location.hash.slice(1)] || currentView;
    applyView(initialView);

    (function () {
      var root = document.documentElement;
      document.getElementById('theme-toggle').addEventListener('click', function () {
        var next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        root.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
      });
    })();
  </script>
</body>
